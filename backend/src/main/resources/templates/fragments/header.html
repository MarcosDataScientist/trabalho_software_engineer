<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
</head>

<body>

    <header class="topo" th:fragment="header">
        <h1>Biblioteca</h1>


        <div class="perfil" style="display: flex; gap: 24px;">
            <!-- Dropdown Aluno -->
            <div class="menu-header" style="position: relative;">
                <div class="btn-nav"
                    onclick="event.stopPropagation(); fecharOutrosDropdowns('aluno-dropdown-menu'); document.getElementById('aluno-dropdown-menu').classList.toggle('show');">
                    Alunos
                    <span>▼</span>
                </div>
                <div id="aluno-dropdown-menu" class="dropdown-content dropdown-nav"
                    style="right: auto; left: 0; min-width: 150px; margin-top: 8px;">
                    <a th:href="@{/cadastro-aluno}">Adicionar Aluno</a>
                    <a th:href="@{/emprestar}">Empréstimos</a>
                    <a th:href="@{/devolver}">Devoluções</a>
                </div>
            </div>

            <!-- Dropdown Livros -->
            <div class="menu-header" style="position: relative;">
                <div class="btn-nav"
                    onclick="event.stopPropagation(); fecharOutrosDropdowns('livro-dropdown-menu'); document.getElementById('livro-dropdown-menu').classList.toggle('show');">
                    Livros
                    <span>▼</span>
                </div>
                <div id="livro-dropdown-menu" class="dropdown-content dropdown-nav"
                    style="right: auto; left: 0; min-width: 150px; margin-top: 8px;">
                    <a th:href="@{/cadastro-livro}">Adicionar Livro</a>
                    <a th:href="@{/unidades}">Unidades</a>
                </div>
            </div>
        </div>


        <!-- Incluindo o fragmento do modal customizado -->
        <div th:replace="~{fragments/modal :: modal}"></div>
    </header>

</body>

</html>
