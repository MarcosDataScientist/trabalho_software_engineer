<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>

    <!-- Fragmento do Modal Customizado de Alerta/Confirmação -->
    <div th:fragment="modal" id="custom-modal" class="modal-overlay" style="display: none;">
        <div class="modal-card">
            <h3 id="modal-title">Mensagem</h3>
            <p id="modal-message">Corpo da mensagem...</p>
            <div class="modal-actions">
                <button type="button" id="modal-btn-confirm">OK</button>
                <button type="button" id="modal-btn-cancel" class="btn-secondary" style="display: none;">Cancelar</button>
            </div>
        </div>
    </div>

</body>
</html>
