<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca - Home</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <!-- Inclui o header do fragment -->
    <div th:replace="~{fragments/header :: header}"></div>

    <main class="container">
        <div class="titulo">
            <h2>Catálogo de Livros</h2>
        </div>

        <div class="lista" id="lista-livros">
            
            <!-- Iterando sobre todos os livros cadastrados -->
            <div th:if="${livros != null and !livros.isEmpty()}">
                <div th:each="livro : ${livros}" class="livro" th:id="'livro-' + ${livro.id}">
                    <div>
                        <h3 th:text="${livro.titulo}">Título</h3>
                        <p style="color: var(--text-secondary); margin: 4px 0;">
                            <strong>Autores:</strong> 
                            <span th:each="autor, iterStat : ${livro.autores}" 
                                  th:text="${autor.nome} + ' ' + ${autor.sobrenome} + ${!iterStat.last ? ', ' : ''}">
                            </span>
                        </p>
                        <p style="font-size: 14px; color: var(--text-muted);">
                            <span th:text="'ISBN: ' + ${livro.isbn}"></span> | 
                            <span th:text="'Edição: ' + ${livro.edicao}"></span> | 
                            <span th:text="'Ano: ' + ${livro.ano}"></span>
                        </p>
                    </div>

                    <div style="display: flex; align-items: center; gap: 16px;">
                        <span th:if="${livro.disponivel}" style="background: rgba(34, 197, 94, 0.1); color: var(--success-color, #22c55e); padding: 6px 12px; border-radius: 6px; font-size: 14px; font-weight: bold;">
                            Disponível
                        </span>
                        <span th:if="${!livro.disponivel}" style="background: rgba(239, 68, 68, 0.1); color: var(--danger-color, #ef4444); padding: 6px 12px; border-radius: 6px; font-size: 14px; font-weight: bold;">
                            Indisponível
                        </span>
                    </div>
                </div>
            </div>

            <!-- Caso não haja livros cadastrados -->
            <div th:if="${livros == null or livros.isEmpty()}" class="livro">
                <div style="text-align: center; width: 100%;">
                    <h3 style="color: var(--text-secondary);">Nenhum livro cadastrado no sistema</h3>
                </div>
            </div>
            
        </div>

    </main>

    <script th:src="@{/js/script.js}"></script>
</body>
</html>
