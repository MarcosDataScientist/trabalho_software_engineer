<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empréstimo de Livros - Biblioteca</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div th:replace="~{fragments/header :: header}"></div>

    <main class="container">
        <div class="titulo">
            <h2>Realizar Empréstimo</h2>
            <button th:onclick="'location.href=\'' + @{/dashboard} + '\''">
                Voltar
            </button>
        </div>

        <form class="form-container" id="form-emprestimo" onsubmit="event.preventDefault(); realizarEmprestimo();">
            <div class="form-group">
                <label for="aluno-select">Selecionar Aluno</label>
                <select id="aluno-select" name="matricula" required>
                    <option value="" disabled selected>Selecione um aluno...</option>
                    <option th:each="alunoItem : ${alunos}" 
                            th:value="${alunoItem.matricula}" 
                            th:text="${alunoItem.nome} + ' (RA: ' + ${alunoItem.matricula} + ')'">
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label for="livro-select">Selecionar Livro</label>
                <select id="livro-select" name="livroId" required>
                    <option value="" disabled selected>Selecione um livro disponível...</option>
                    <option th:each="livro : ${livrosDisponiveis}" 
                            th:value="${livro.id}" 
                            th:text="${livro.titulo} + ' (ISBN: ' + ${livro.isbn} + ')'">
                    </option>
                </select>
            </div>

            <div class="form-actions">
                <button type="submit">Confirmar Empréstimo</button>
            </div>
        </form>

    </main>

    <script th:src="@{/js/script.js}"></script>
</body>
</html>
