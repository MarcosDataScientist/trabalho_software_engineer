<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Livro - Biblioteca</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div th:replace="~{fragments/header :: header}"></div>

    <main class="container">
        <div class="titulo">
            <h2>Cadastrar Novo Livro</h2>
            <button th:onclick="'location.href=\'' + @{/dashboard} + '\''">
                Voltar
            </button>
        </div>

        <form class="form-container" id="form-livro" th:action="@{/api/livros}" method="post">
            <div class="form-group">
                <label for="codigo">Código do Livro (ID)</label>
                <input type="number" id="codigo" name="codigo" required placeholder="Digite o código (Ex: 101)" min="1">
            </div>

            <div class="form-group">
                <label for="titulo">Título do Livro</label>
                <input type="text" id="titulo" name="titulo" required placeholder="Digite o título do livro">
            </div>

            <div class="form-group">
                <label for="autor">Autor</label>
                <input type="text" id="autor" name="autor" required placeholder="Digite o nome do autor">
            </div>

            <div class="form-group">
                <label for="prazo">Prazo de Empréstimo (Dias)</label>
                <select id="prazo" name="prazo" required>
                    <option value="" disabled selected>Selecione o prazo de devolução</option>
                    <option value="7">7 Dias (Padrão)</option>
                    <option value="14">14 Dias (Estendido)</option>
                    <option value="21">21 Dias (Especial)</option>
                </select>
            </div>

            <div class="form-actions">
                <button type="button" class="btn-secondary" th:onclick="'location.href=\'' + @{/dashboard} + '\''">Cancelar</button>
                <button type="button" onclick="salvarLivro()">Cadastrar</button>
            </div>
        </form>

    </main>

    <script th:src="@{/js/script.js}"></script>
</body>
</html>
