<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Aluno - Biblioteca</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

    <div th:replace="~{fragments/header :: header}"></div>

    <main class="container">
        <div class="titulo">
            <h2>Cadastrar Novo Aluno</h2>
            <button th:onclick="'location.href=\'' + @{/dashboard} + '\''">
                Voltar
            </button>
        </div>

        <form class="form-container" id="form-aluno" th:action="@{/api/alunos}" method="post">
            <div class="form-group">
                <label for="matricula">Matrícula (RA)</label>
                <!-- O name mapeia direto pro DTO -->
                <input type="number" id="matricula" name="matricula" required
                    placeholder="Digite a matrícula (Ex: 12345)">
            </div>

            <div class="form-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" name="nome" required placeholder="Digite o nome completo do aluno">
            </div>

            <div class="form-group">
                <label for="cpf">CPF</label>
                <input type="text" id="cpf" name="cpf" required placeholder="000.000.000-00">
            </div>

            <div class="form-group">
                <label for="endereco">Endereço</label>
                <input type="text" id="endereco" name="endereco" required placeholder="Rua, Número, Bairro">
            </div>

            <div class="form-actions">
                <button type="button" class="btn-secondary"
                    th:onclick="'location.href=\'' + @{/dashboard} + '\''">Cancelar</button>
                <!-- Se fosse full mvc, type="submit". Mas nossa api retorna json. Usamos js mock pra exibir a msg e voltar. -->
                <button type="button" onclick="salvarAluno()">Cadastrar</button>
            </div>
        </form>

    </main>

    <script th:src="@{/js/script.js}"></script>
</body>

</html>
